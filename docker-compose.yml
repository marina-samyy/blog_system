services:
  db:
    image: postgres:15-alpine
    container_name: blog_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=Jesus_2003
      - POSTGRES_DB=blog_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d blog_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis_cache
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: fastapi_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg2://postgres:Jesus_2003@db:5432/blog_db
      - REDIS_URL=redis://redis:6379/0
      - REDIS_HOST=redis
      - PYTHONPATH=/code
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy